<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Boostrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="inicio.css">
    <title>La salle</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html"
                style="border-bottom: 3px solid #3498db; font-size: 25px !important; font-weight: bold !important;">Asociación
                Cooperativa La Salle</a>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center v-100 login" style="min-height: 100vh;">

        <div class="card p-4 shadow-sm" style="width: 25rem; background-color: white !important;">
            <div class="card-body" style="background-color: white !important; opacity: 1 !important;">
                <h3 class="text-center mb-4" style="font-weight: bold !important;">Iniciar Sesión</h3>
                <form>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label"
                            style="font-weight: bold !important;">Usuario</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                            placeholder="Ingrese su usuario" style="border-color: #3498db !important;">
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label"
                            style="font-weight: bold !important;">Contraseña</label>
                        <input type="password" class="form-control" id="Password" placeholder="Ingrese su contraseña"
                            style="border-color: #3498db !important;">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="Check1"
                            style="border-color: #3498db !important;">
                        <label class="form-check-label" for="Check1">Mirar contraseña</label>
                    </div>
                    <script>
                        const checkbox = document.getElementById('Check1');
                        const passInput = document.getElementById('Password');
                        checkbox.addEventListener('change', function () {
                            if (this.checked) {
                                passInput.type = 'text';
                            } else {
                                passInput.type = 'password';
                            }
                        });
                    </script>

                    <div class="d-grid gap-2">
                        <a class="btn btn-outline-dark"
                            style="border-color: #3498db !important; font-weight: bold !important;"
                            href="../primera vista/primera_vista.html">Iniciar sesion</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="Boostrap/js/bootstrap.bundle.min.js"></script>

</html>
