<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Boostrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="inicio.css">
    <title>La salle</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">Asociación Cooperativa La Salle</a>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center v-100 login" style="min-height: 100vh;">

        <div class="card p-4 shadow" style="width: 25rem";>
            <div class="card-body">
                <h3 class="text-center mb-4">Iniciar Sesión</h3>
                <form>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Usuario</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                            placeholder="Ingrese su usuario">
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="exampleInputPassword1"
                            placeholder="Ingrese su contraseña">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="exampleCheck1">
                        <label class="form-check-label" for="exampleCheck1">Mirar contraseña</label>
                    </div>
                    <div class="d-grid gap-2">
                        <a class="btn btn-outline-dark" href="../primera vista/primera_vista.html">Iniciar sesion</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="Boostrap/js/bootstrap.bundle.min.js"></script>

</html>
