<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Doctor | Gestión Médica</title>
    <link rel="stylesheet" href="vista_roles.css">
    <link rel="stylesheet" href="Boostrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../inicio de sesion/script.js">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a class="brand-text">Asociación Cooperativa La Salle</a>
            <div class="options-accordion">
                <button class="accordion-btn" id="btnOpciones">
                    Opciones <ion-icon name="chevron-down-outline" class="accordion-icon"></ion-icon>
                </button>
                <div class="panel" id="panelOpciones">
                    <a href="../inicio de sesion/inicio_sesion.html"><ion-icon name="exit-outline"></ion-icon>Salir</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="dashboard-container">
        <header class="main-header">
            <h1>Bienvenido, Dr. !</h1>
            <section class="dashboard-content">
                <div class="card agenda">
                    <div class="card-header">
                        <h2>Consultas del día</h2>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Hora</th>
                                    <th>Paciente</th>
                                    <th>Motivo</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>08:00</td>
                                    <td class="patient-name">Ana Rodríguez</td>
                                    <td>Consulta General</td>
                                    <td><span class="status-badge waiting">En espera</span></td>
                                </tr>
                                <tr>
                                    <td>09:30</td>
                                    <td class="patient-name">Carlos Pérez</td>
                                    <td>Seguimiento</td>
                                    <td><span class="status-badge success">Atendido</span></td>
                                </tr>

                                <tr>
                                    <td>10:00</td>
                                    <td class="patient-name">Susana Castillo</td>
                                    <td>Consulta General</td>
                                    <td><span class="status-badge cancel">Cancelado</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <aside class="sidebar-actions">
                    <div class="card stats">
                        <div class="stat-item">
                            <span class="stat-label">Citas hoy 03</span>
                            <span class="stat-value"></span>
                        </div>
                    </div>

                    <div class="card quick-menu">
                        <nav>
                            <a href="#" class="action-btn primary">Crear Historia Clínica</a>
                            <a href="#" class="action-btn secondary">Emitir Receta</a>
                        </nav>
                    </div>
                </aside>
            </section>
    </main>
    <script src="../index.js"></script>
</body>

<script src="Boostrap/js/bootstrap.bundle.min.js"></script>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src=" https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js "></script>

</html>
